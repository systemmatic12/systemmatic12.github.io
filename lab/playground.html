<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Magnet Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; color: white; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px; width: 200px;
            border: 1px solid #333; pointer-events: auto; z-index: 10;
        }
        button {
            display: block; width: 100%; margin-bottom: 5px; padding: 8px;
            cursor: pointer; border: none; border-radius: 4px; font-weight: bold;
        }
        .btn-spawn { background: #4CAF50; color: white; }
        .btn-cam { background: #2196F3; color: white; }
        .active { background: #ffeb3b; color: black; }
        .instr { font-size: 11px; color: #aaa; margin-bottom: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui">
    <h3>Magnet World</h3>
    <div class="instr">
        <b>Hold Left Click:</b> Pull to Mouse<br>
        <b>Hold Right Click:</b> Push from Mouse<br>
        <b>Spacebar:</b> Spawn Box
    </div>
    <button class="btn-spawn" onclick="spawnBox()">Spawn Box (Space)</button>
    <button id="camBtn" class="btn-cam" onclick="toggleCamera()">Camera Mode: OFF</button>
    <div style="margin: 10px 0;"><input type="checkbox" id="staticToggle"> Static Mode</div>
    <button style="background:#444; color:white;" onclick="clearWorld()">Clear All</button>
</div>

<script>
    // --- Setup Variables ---
    let isCameraMode = false;
    let isLeftDown = false;
    let isRightDown = false;
    const objects = [];
    const mouse3D = new THREE.Vector3();

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const world = new CANNON.World();
    world.gravity.set(0, -15, 0);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enabled = false;

    // Lighting
    scene.add(new THREE.AmbientLight(0x404040));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 50, 10);
    light.castShadow = true;
    scene.add(light);

    // Ground
    const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);
    const groundBody = new CANNON.Body({ mass: 0 });
    groundBody.addShape(new CANNON.Plane());
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    world.addBody(groundBody);

    const raycaster = new THREE.Raycaster();
    const mouse2D = new THREE.Vector2();

    // --- Functions ---
    function toggleCamera() {
        isCameraMode = !isCameraMode;
        controls.enabled = isCameraMode;
        document.getElementById('camBtn').innerText = `Camera Mode: ${isCameraMode ? 'ON' : 'OFF'}`;
        document.getElementById('camBtn').classList.toggle('active');
    }

    function spawnBox() {
        const isStatic = document.getElementById('staticToggle').checked;
        const size = 1.5;
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(size, size, size), 
            new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
        );
        mesh.castShadow = true;
        
        const body = new CANNON.Body({ mass: isStatic ? 0 : 1 });
        body.addShape(new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2)));
        
        // Spawn at mouse position or center
        body.position.set(mouse3D.x, 10, mouse3D.z);
        
        scene.add(mesh);
        world.addBody(body);
        objects.push({ mesh, body });
    }

    // --- Input Handling ---
    window.addEventListener('mousedown', (e) => {
        if (isCameraMode || e.target.tagName !== 'CANVAS') return;
        if (e.button === 0) isLeftDown = true;
        if (e.button === 2) isRightDown = true;
    });

    window.addEventListener('mouseup', () => { isLeftDown = false; isRightDown = false; });
    window.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') spawnBox(); });

    window.addEventListener('mousemove', (e) => {
        mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        // Update 3D mouse position by raycasting against ground
        raycaster.setFromCamera(mouse2D, camera);
        const intersects = raycaster.intersectObject(groundMesh);
        if (intersects.length > 0) {
            mouse3D.copy(intersects[0].point);
        }
    });

    function applyMagneticForce() {
        if (!isLeftDown && !isRightDown) return;

        objects.forEach(obj => {
            if (obj.body.mass === 0) return; // Ignore static objects

            // Calculate vector from object to mouse
            const forceDir = new CANNON.Vec3(
                mouse3D.x - obj.body.position.x,
                0, // Keep force mostly horizontal for better control
                mouse3D.z - obj.body.position.z
            );

            const distance = forceDir.norm();
            if (distance < 30) { // Range of magnet
                forceDir.normalize();
                const strength = isLeftDown ? 25 : -40; // Pull vs Push
                
                // Apply force
                obj.body.applyForce(forceDir.scale(strength), obj.body.position);
                
                // Add a bit of "damping" so they don't fly away forever
                obj.body.velocity.scale(0.98, obj.body.velocity);
            }
        });
    }

    function clearWorld() {
        objects.forEach(obj => { scene.remove(obj.mesh); world.remove(obj.body); });
        objects.length = 0;
    }

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);
        world.step(1/60);
        
        if (!isCameraMode) applyMagneticForce();

        objects.forEach(obj => {
            obj.mesh.position.copy(obj.body.position);
            obj.mesh.quaternion.copy(obj.body.quaternion);
        });

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
