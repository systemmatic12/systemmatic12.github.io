<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantumEdit V3 - Multi-Layer Studio</title>
    <style>
        :root { --bg: #0d0d0f; --panel: #16161a; --accent: #00f2ff; --text: #f0f0f0; --border: #2d2d32; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 1fr 180px; height: 100vh; }
        
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .preview-area { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .timeline { grid-column: span 2; background: var(--panel); padding: 15px; border-top: 1px solid var(--border); }

        canvas { max-width: 90%; max-height: 75%; border: 1px solid #333; background: #000; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 12px; }
        .btn.secondary { background: #333; color: white; margin-top: 5px; }
        .btn.export { background: #ff3e3e; color: white; margin-top: 20px; }
        
        .control-group { background: #1c1c21; padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 5px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 5px; box-sizing: border-box; }

        .track { width: 100%; height: 40px; background: #000; border: 1px solid #333; position: relative; margin-bottom: 5px; cursor: pointer; }
        #playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h3 style="color:var(--accent); margin:0 0 10px 0;">LAYERS</h3>
        
        <div class="control-group">
            <label>1. Main Video</label>
            <input type="file" id="bgVideoInput" accept="video/*">
        </div>

        <div class="control-group">
            <label>2. Overlay Video (PiP)</label>
            <input type="file" id="overlayVideoInput" accept="video/*">
        </div>

        <div class="control-group">
            <label>3. PNG Overlay / Logo</label>
            <input type="file" id="imageInput" accept="image/png, image/jpeg">
        </div>

        <div class="control-group">
            <label>4. Subtitles / Text</label>
            <input type="text" id="overlayText" placeholder="Type here...">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="number" id="textX" value="50" title="X Position (%)">
                <input type="number" id="textY" value="80" title="Y Position (%)">
            </div>
        </div>

        <button class="btn export" id="exportBtn">SAVE VIDEO</button>
        <div id="status" style="font-size:11px; color:var(--accent); text-align:center; margin-top:5px;">Ready</div>
    </div>

    <div class="preview-area">
        <canvas id="editorCanvas"></canvas>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn" id="playBtn" style="width:80px;">PLAY</button>
            <span id="timecode">00:00.0</span>
        </div>
    </div>

    <div class="timeline">
        <label>Seek Timeline</label>
        <div class="track" id="mainTrack"><div id="playhead"></div></div>
    </div>
</div>

<video id="bgVid" style="display:none" crossOrigin="anonymous"></video>
<video id="overlayVid" style="display:none" crossOrigin="anonymous" loop muted></video>
<img id="overlayImg" style="display:none">

<script>
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const bgVid = document.getElementById('bgVid');
    const overlayVid = document.getElementById('overlayVid');
    const overlayImg = document.getElementById('overlayImg');
    
    // Inputs
    const bgInput = document.getElementById('bgVideoInput');
    const overVidInput = document.getElementById('overlayVideoInput');
    const imgInput = document.getElementById('imageInput');
    const textInput = document.getElementById('overlayText');
    const playBtn = document.getElementById('playBtn');

    let isPlaying = false;

    // Loaders
    bgInput.onchange = e => { bgVid.src = URL.createObjectURL(e.target.files[0]); bgVid.onloadedmetadata = () => { canvas.width = bgVid.videoWidth; canvas.height = bgVid.videoHeight; render(); }};
    overVidInput.onchange = e => { overlayVid.src = URL.createObjectURL(e.target.files[0]); overlayVid.play(); };
    imgInput.onchange = e => { overlayImg.src = URL.createObjectURL(e.target.files[0]); };

    // Core Rendering Engine (The "Stack")
    function render() {
        // Layer 1: Background Video
        ctx.drawImage(bgVid, 0, 0, canvas.width, canvas.height);

        // Layer 2: Overlay Video (Small Corner)
        if (overlayVid.src) {
            ctx.drawImage(overlayVid, 20, 20, canvas.width/4, canvas.height/4);
        }

        // Layer 3: PNG Image
        if (overlayImg.src) {
            ctx.drawImage(overlayImg, canvas.width - (canvas.width/4) - 20, 20, canvas.width/4, canvas.height/4);
        }

        // Layer 4: Text Overlay
        if (textInput.value) {
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.font = `${canvas.height/15}px Impact`;
            ctx.textAlign = "center";
            const tx = (document.getElementById('textX').value / 100) * canvas.width;
            const ty = (document.getElementById('textY').value / 100) * canvas.height;
            ctx.strokeText(textInput.value, tx, ty);
            ctx.fillText(textInput.value, tx, ty);
        }

        // UI Updates
        document.getElementById('playhead').style.left = (bgVid.currentTime / bgVid.duration) * 100 + "%";
        document.getElementById('timecode').innerText = bgVid.currentTime.toFixed(1) + "s";

        if (isPlaying) requestAnimationFrame(render);
    }

    // Controls
    playBtn.onclick = () => {
        if (bgVid.paused) { bgVid.play(); overlayVid.play(); isPlaying = true; playBtn.innerText = "PAUSE"; render(); }
        else { bgVid.pause(); overlayVid.pause(); isPlaying = false; playBtn.innerText = "PLAY"; }
    };

    document.getElementById('mainTrack').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        bgVid.currentTime = ((e.clientX - rect.left) / rect.width) * bgVid.duration;
        render();
    };

    // Export Logic
    document.getElementById('exportBtn').onclick = () => {
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        bgVid.currentTime = 0;
        bgVid.play();
        isPlaying = true;
        render();
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'quantum-masterpiece.webm';
            a.click();
        };
        recorder.start();
        document.getElementById('status').innerText = "🔴 RECORDING...";
        bgVid.onended = () => { recorder.stop(); document.getElementById('status').innerText = "DONE!"; };
    };
</script>
</body>
</html>
