<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantumEdit Studio</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #141417; --accent: #00f2ff; --text: #efefef; --border: #2a2a2e; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Layout Grid */
        .app-container { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 1fr 250px; height: 100vh; }
        
        /* Panels */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; z-index: 10; }
        .preview-area { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .timeline { grid-column: span 2; background: var(--panel); border-top: 1px solid var(--border); padding: 20px; overflow-x: auto; }

        /* Canvas & Video */
        canvas { max-width: 90%; max-height: 70%; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); background: #111; }
        
        /* UI Elements */
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 10px; width: 100%; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn.export { background: #ff0055; color: white; margin-top: 20px; }
        
        .stat-box { background: #1c1c21; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }

        /* Timeline Slider */
        .timeline-track { width: 100%; height: 80px; background: #000; border-radius: 8px; position: relative; margin-top: 10px; border: 1px solid var(--accent); }
        #playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: white; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-top: 0;">QUANTUM</h2>
        
        <button class="btn" onclick="document.getElementById('videoInput').click()">+ IMPORT VIDEO</button>
        <input type="file" id="videoInput" accept="video/*" style="display:none">

        <div class="stat-box">
            <label>Color Grading (Saturation)</label>
            <input type="range" id="saturation" min="0" max="200" value="100" style="width:100%">
        </div>

        <div class="stat-box">
            <label>Brightness</label>
            <input type="range" id="brightness" min="0" max="200" value="100" style="width:100%">
        </div>

        <div class="stat-box">
            <label>Trim End (Seconds)</label>
            <input type="number" id="trimEnd" value="10" step="0.5" style="background:#000; border:1px solid #444; color:white; width:100%">
        </div>

        <button class="btn export" id="exportBtn">RENDER & DOWNLOAD</button>
        <p id="status" style="font-size: 12px; color: #888;"></p>
    </div>

    <div class="preview-area">
        <canvas id="mainCanvas"></canvas>
        <div style="margin-top: 20px;">
            <button class="btn" id="playBtn" style="width: 120px;">▶ PLAY</button>
        </div>
    </div>

    <div class="timeline">
        <div style="display: flex; justify-content: space-between;">
            <span>TIMELINE</span>
            <span id="timecode">00:00.0</span>
        </div>
        <div class="timeline-track">
            <div id="playhead"></div>
            <div id="clipVisual" style="position:absolute; height:100%; background: rgba(0, 242, 255, 0.2); width: 100%;"></div>
        </div>
    </div>
</div>

<video id="sourceVideo" style="display:none"></video>

<script>
    const video = document.getElementById('sourceVideo');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const playBtn = document.getElementById('playBtn');
    const playhead = document.getElementById('playhead');
    
    // Settings
    let isPlaying = false;

    // 1. Load Video
    document.getElementById('videoInput').onchange = (e) => {
        const file = e.target.files[0];
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            document.getElementById('trimEnd').value = video.duration.toFixed(1);
            drawFrame(); // Draw first frame
        };
    };

    // 2. The Rendering Engine (With Filters)
    function drawFrame() {
        ctx.filter = `saturate(${document.getElementById('saturation').value}%) brightness(${document.getElementById('brightness').value}%)`;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Update Playhead
        const progress = (video.currentTime / video.duration) * 100;
        playhead.style.left = progress + "%";
        document.getElementById('timecode').innerText = video.currentTime.toFixed(1) + "s";

        if (video.currentTime >= document.getElementById('trimEnd').value) {
            stopPlayback();
        }

        if (isPlaying) requestAnimationFrame(drawFrame);
    }

    // 3. Playback Controls
    playBtn.onclick = () => {
        if (video.paused) {
            if (video.currentTime >= document.getElementById('trimEnd').value) video.currentTime = 0;
            video.play();
            isPlaying = true;
            playBtn.innerText = "|| PAUSE";
            drawFrame();
        } else {
            stopPlayback();
        }
    };

    function stopPlayback() {
        video.pause();
        isPlaying = false;
        playBtn.innerText = "▶ PLAY";
    }

    // 4. THE EXPORTER (Better than CapCut - Save your work!)
    document.getElementById('exportBtn').onclick = () => {
        const stream = canvas.captureStream(30); // Capture canvas at 30 FPS
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'quantum-edit-export.webm';
            a.click();
            document.getElementById('status').innerText = "Export Complete!";
        };

        // Reset and record
        video.currentTime = 0;
        video.play();
        isPlaying = true;
        recorder.start();
        document.getElementById('status').innerText = "Rendering... (Keep tab open)";

        // Stop recording when trim end reached
        const checkEnd = setInterval(() => {
            if (video.currentTime >= document.getElementById('trimEnd').value) {
                recorder.stop();
                stopPlayback();
                clearInterval(checkEnd);
            }
        }, 100);
    };
</script>
</body>
</html>
